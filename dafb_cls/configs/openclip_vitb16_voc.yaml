backbone_type: "openclip_vitb16"
layer_indices: [3, 6, 9, 12]
image_size: 224
patch_size: 16
hidden_dim: 256
fusion_hidden_dim: 256
head_hidden_dim: 512

task: "segmentation"
num_classes: 21
upsample_size: 56

frequency_sigma: 0.25
depth_method: "cosine"
semantic_method: "patch_cls_similarity"
spatial_kernel: 3
tau_from_global: true
depth_attn_zero_init: true

dataset: "voc"
data_root: "./datasets"
voc_year: "2012"
train_split: "train"
val_split: "val"

batch_size: 16
epochs: 50
lr: 5.0e-5
weight_decay: 1.0e-4
scheduler: "cosine"
amp: true

lambda_fg: 2.0
lambda_decouple: 0.1
lambda_budget: 0.02
decouple_method: "cosine_squared"
r_min: 0.1
r_max: 0.7

eval_interval: 5
save_interval: 10
save_dir: "./checkpoints/openclip_vitb16_voc"
device: "cuda"
num_workers: 0
